# template-version: 2026-07.33
#
# ADAPT: fill every {{}} slot for your stack, or overlay profiles/<stack>/ci.yml
# from the seed. Rename to ci.yml. Keep the template-version line above when
# you strip these ADAPT comments — it is what "Upgrading seeded apps" diffs.
# Delete this file only if not hosted on GitHub.
# Policy: lint treats warnings as errors — any new warning fails the build.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup toolchain
        run: {{TOOLCHAIN SETUP — or replace with a setup action, e.g. actions/setup-node@v6}}
      - name: Install
        run: {{INSTALL CMD — e.g. npm ci}}
      - name: Check (format + lint w/ zero warnings + typecheck + fast tests)
        run: {{CHECK CMD — same gate as AGENTS.md Invariant 1}}
      - name: Test (full suite)
        run: {{TEST CMD}}
      - name: Build
        run: {{BUILD CMD}}
      - name: Dependency audit
        # Audit red on adoption day with the fix deferred (ADOPTION
        # steps 8–9)? Add `continue-on-error: true` here plus a
        # `deferred` entry in docs/wiki/log.md naming the trigger that
        # turns the step hard again — never day-one-red CI, and never
        # silent yellow either; the log entry is the difference.
        run: {{AUDIT CMD — e.g. npm audit --audit-level=high}}
